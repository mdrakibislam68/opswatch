version: '3.9'

networks:
  opswatch:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: opswatch-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: opswatch
      POSTGRES_USER: opswatch
      POSTGRES_PASSWORD: opswatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - opswatch

  redis:
    image: redis:7-alpine
    container_name: opswatch-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - opswatch

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: opswatch-api-dev
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: opswatch
      DB_PASS: opswatch
      DB_NAME: opswatch
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev_jwt_secret
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - ../apps/api/src:/app/src
    networks:
      - opswatch
