# Root-level compose that references the deploy folder
# Usage: docker compose up -d


networks:
  opswatch:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: opswatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-opswatch}
      POSTGRES_USER: ${DB_USER:-opswatch}
      POSTGRES_PASSWORD: ${DB_PASS:-opswatch_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - opswatch
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-opswatch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opswatch-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    networks:
      - opswatch
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: opswatch-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/api/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - opswatch
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: opswatch-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ./apps/web/.env
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - opswatch

  nginx:
    image: nginx:alpine
    container_name: opswatch-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:8080"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - opswatch
